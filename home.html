<!DOCTYPE html> 
<html>
<head>
    <title>Quotes || Osaidii</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/home-icon.png">
    <style>
        .anim {
            opacity: 0;
            filter: blur(15px);
            transform: translateY(30px);
            animation: reveal 1s ease forwards;
        }
        @keyframes reveal {
            0% {
                opacity: 0;
                filter:blur(15px);
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }
        #quote {animation-delay: 0.2s;}
        #footer {animation-delay: 0.4s;}
        #music {animation-delay: 0.6s;}
    </style>
</head>
<body>
    <div id="container">
    <h1 id="quote" class="anim">Quote is loading...</h1>
    <script src=script.js></script>
    </div>
    <div id="footer" class="anim">
        <p>
        <span>
            <a>@ 2026 Osaid Hassan || </a>
        </span>
        <span>
            <a>Open Source on Github</a>
        </span>
        </p>
    </div>
</body>
</html>
